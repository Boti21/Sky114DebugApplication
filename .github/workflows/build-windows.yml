name: Build Windows

on: 
  release:
    types: [ created ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.7.2'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'

    - name: Install CMake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '3.27.x'

    - name: Build Paho MQTT C
      run: |
        git clone https://github.com/eclipse/paho.mqtt.c.git
        cd paho.mqtt.c
        mkdir build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -DPAHO_BUILD_STATIC=ON
        cmake --build . --config Release
        cmake --install . --prefix "${{ github.workspace }}/paho-install"

    - name: Build Paho MQTT C++
      run: |
        git clone https://github.com/eclipse/paho.mqtt.cpp.git
        cd paho.mqtt.cpp
        mkdir build && cd build
        cmake .. `
          -DCMAKE_BUILD_TYPE=Release `
          -DPAHO_BUILD_STATIC=ON `
          -DCMAKE_PREFIX_PATH="${{ github.workspace }}/paho-install"
        cmake --build . --config Release
        cmake --install . --prefix "${{ github.workspace }}/paho-install"

    - name: Configure Qt Project
      run: |
        mkdir build && cd build
        cmake .. `
          -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }};${{ github.workspace }}/paho-install" `
          -DCMAKE_BUILD_TYPE=Release

    - name: Build Qt Project
      run: |
        cd build
        cmake --build . --config Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Sky114DebugApplication-windows
        path: build/Release/appSky114DebugApplication.exe
