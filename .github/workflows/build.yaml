name: Build Qt WebAssembly and Go Wrapper

on:
  release:
    type: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          # Qt 6 generally requires specific emsdk versions. 
          # 3.1.56 is stable for recent Qt 6 releases.
          version: '3.1.56' 

      # 1. Install Host Qt (Required for build tools like moc, rcc)
      - name: Install Qt Host Tools
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.2'
          target: 'desktop'
          arch: 'linux_gcc_64'

      # 2. Install WebAssembly Target
      - name: Install Qt WebAssembly
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.2'
          target: 'desktop'
          arch: 'wasm'
          modules: 'qtwebsockets qtmqtt qtgraphs'

      - name: Configure and Build Qt WebAssembly
        run: |
          mkdir -p build/wasm
          cd build/wasm
          
          # Call the specific WebAssembly qt-cmake
          /home/runner/work/_temp/Qt/6.8.2/wasm/bin/qt-cmake ../../ -DCMAKE_BUILD_TYPE=Release
          cmake --build .

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Go Executable (Linux AMD64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o Sky114DebugApplication-linux-amd64 Sky114DebugApplication.go

      - name: Build Go Executable (Windows AMD64)
        run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o Sky114DebugApplication-windows-amd64.exe Sky114DebugApplication.go

      - name: Build Go Executable (Apple Silicon / macOS ARM64)
        run: CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o Sky114DebugApplication-darwin-arm64 Sky114DebugApplication.go

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: embedded-servers
          path: |
            Sky114DebugApplication-linux-amd64
            Sky114DebugApplication-windows-amd64.exe
            Sky114DebugApplication-darwin-arm64
